name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  node:
    name: Node checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Pack dry-run
        run: npm run pack:dry-run

      - name: Web typecheck
        run: npm run web:typecheck

      - name: Web test
        run: npm run web:test

      - name: Web build
        run: npm run web:build
